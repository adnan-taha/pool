<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07110e" />
    <title>Billiards</title>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <a class="brand" href="#" aria-label="Billiards home">
          <span>BILLIARDS</span>
        </a>
        <div class="turn-card">
          <span id="turn-label">PLAYER ONE</span>
          <strong id="turn-status">YOUR SHOT</strong>
        </div>
        <div class="top-actions">
          <button class="icon-button sound-button" id="sound-button" type="button" aria-label="Mute sound effects" title="Mute sound effects">SFX</button>
          <button class="icon-button" id="reset-button" type="button" aria-label="Reset game" title="Reset game">↻</button>
        </div>
      </header>

      <section class="game-layout">
        <aside class="score-panel player-one active" id="player-one-panel">
          <input class="player-name" id="player-one-name" maxlength="16" value="Player 1" aria-label="Player one name" />
          <strong id="player-one-score">0</strong>
          <span id="player-one-group">OPEN</span>
          <small>WINS <b id="player-one-match">0</b></small>
          <div class="ball-tray" id="player-one-tray"></div>
        </aside>

        <div class="table-wrap" id="table-wrap">
          <div id="game-canvas" aria-label="Interactive 3D pool table"></div>
          <div class="foul-notice hidden" id="foul-notice" role="status" aria-live="polite">
            <span>FOUL</span>
            <strong id="foul-reason">Cue ball scratched</strong>
          </div>
          <div class="table-message hidden" id="table-message">
            <span id="message-kicker">GAME OVER</span>
            <strong id="message-title">PLAYER ONE WINS</strong>
            <button id="play-again" type="button">PLAY AGAIN</button>
          </div>
          <div class="mobile-hint">DRAG TO AIM · RELEASE TO SHOOT</div>
        </div>

        <aside class="score-panel player-two" id="player-two-panel">
          <input class="player-name" id="player-two-name" maxlength="16" value="Player 2" aria-label="Player two name" />
          <strong id="player-two-score">0</strong>
          <span id="player-two-group">OPEN</span>
          <small>WINS <b id="player-two-match">0</b></small>
          <div class="ball-tray" id="player-two-tray"></div>
        </aside>
      </section>

      <footer class="control-deck">
        <div class="spin-control">
          <div class="spin-heading">
            <span>CUE SPIN</span>
            <strong id="spin-value">CENTER</strong>
          </div>
          <div class="spin-tools">
            <div
              class="spin-pad"
              id="spin-pad"
              role="application"
              tabindex="0"
              aria-label="Cue ball spin: drag the marker or use W A S D"
            >
              <i id="spin-marker"></i>
            </div>
            <button id="spin-reset" type="button">CENTER</button>
          </div>
        </div>
        <div class="power-control">
          <label for="power-slider"><span>SHOT POWER</span><strong id="power-value">48%</strong></label>
          <input id="power-slider" type="range" min="15" max="100" value="48" />
          <div class="power-scale"><i></i><i></i><i></i><i></i><i></i></div>
          <small class="power-keys">ARROW KEYS</small>
        </div>
        <button class="shoot-button" id="shoot-button" type="button">
          <span>SHOOT</span>
          <small>SPACE</small>
        </button>
      </footer>
    </main>

    <script type="module" src="/src/app/main.js"></script>
  </body>
</html>
